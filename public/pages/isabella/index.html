<!DOCTYPE html>
<html lang="es-AR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabella Cumple</title>

    <!-- Bootstrap’s CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- CSS style -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <!-- El anuncio que dice que estas invitado/a a: "Mi cumple", "Mi Fiesta", "La kermes", "Mi Spa Cumple", etc -->
        <div class="anuncio">

            <!-- <p>¡estás invitado/a a la:</p>
            <span>kermés</span>
            <hr> -->
        </div>
        <!-- Informacion del cumpleañero/a -->
        <section class="info-cumple">
            <!--
             Cumpleaños número
             8
             +de+
             ISI
             banner
            -->
            <p>cumpleaños número</p>
            <p class="number">8</p>
            <p>de <span class="user-name">isi ruiz</span></p>

        </section>
    </header>

    <div class="spacer"></div>
    <!-- Aquí va la información del horario, fecha y dirección del lugar -->
    <section class="info-event">
        <!-- Fecha -->
        <div class="mini-card fecha">
            <i class="bi bi-calendar2-heart"></i>
            <time datetime="2026-05-03">
                03 de mayo del 2026
            </time>
        </div>
        <!-- Horario: desde><hasta -->
        <div class="mini-card horario">
            <i class="bi bi-alarm"></i>
            <div>
                De <time datetime="15:00">15:00</time>
                a <time datetime="18:00">18:00</time> hs
            </div>
        </div>
        <!-- dirección + google maps link -->
        <div class="mini-card maps">
            <i class="bi bi-geo-alt"></i>
            <span>club roma</span>
        </div>
    </section>

    <nav>
        <!-- <button class="btn btn-warning rounded-circle btn-trigger"><i class="bi bi-stars"></i></button> -->
        <button id="qr" class="btn-trigger"><i class="bi bi-qr-code"></i></button>

        <button id="send" class="btn-trigger"><i class="bi bi-gift-fill"></i></button>

        <button id="share" class="btn-trigger" type="button" data-bs-toggle="offcanvas"
            data-bs-target="#offcanvasBottom" aria-controls="offcanvasBottom">
            <i class="bi bi-share-fill"></i>
        </button>
    </nav>


    <!-- Dialog QR -->
    <dialog id="qr-dialog" class="rounded border-0 shadow-lg p-3" style="max-width: 90vw;">
        <div class="d-flex justify-content-end mb-2">
            <button id="close-qr-dialog" class="btn btn-outline-secondary border-0 fs-5 lh-1 p-1"><i
                    class="bi bi-x-lg"></i></button>
        </div>
        <img src="img/qr_isabella_2026.png" alt="Código QR" class="img-fluid rounded mx-auto d-block">
    </dialog>

    <!-- Dialog Send -->
    <dialog id="send-dialog" class="rounded border-0 shadow-lg p-3" style="max-width: 90vw; min-width: 300px;">
        <div class="d-flex justify-content-end mb-2">
            <button id="close-send-dialog" class="btn btn-outline-secondary border-0 fs-5 lh-1 p-1"><i
                    class="bi bi-x-lg"></i></button>
        </div>
        <section class="text-dark">
            <h5 class="mb-3 text-center">Datos para regalo</h5>

            <div class="mb-3 p-2 border rounded d-flex justify-content-between align-items-center">
                <div>
                    <small class="d-block text-muted text-start lh-1 mb-1">CVU</small>
                    <span id="cvu-text" class="fw-bold fs-6">0000003100012345678901</span>
                </div>
                <button class="btn-trigger btn btn-sm btn-outline-primary copy-btn" data-target="cvu-text">
                    <i class="bi bi-copy"></i>
                </button>
            </div>

            <div class="p-2 border rounded d-flex justify-content-between align-items-center">
                <div>
                    <small class="d-block text-muted text-start lh-1 mb-1">ALIAS</small>
                    <span id="alias-text" class="fw-bold fs-6">ISABELLA.CUMPLE.2026</span>
                </div>
                <button class="btn btn-sm btn-outline-primary copy-btn" data-target="alias-text">
                    <i class="bi bi-copy"></i>
                </button>
            </div>
        </section>
    </dialog>

    <!-- Offcanvas Share -->
    <div class="offcanvas offcanvas-bottom" tabindex="-1" id="offcanvasBottom" aria-labelledby="offcanvasBottomLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasBottomLabel">Compartir:</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body small">
            <i id="share-wa" class="bi bi-whatsapp"></i>
        </div>
    </div>

    <!-- Bootstrap Script -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <!-- Confetti Script -->
    <script src="js/confetti.js"></script>
    <script src="js/scripts.js"></script>

</body>

</html>
