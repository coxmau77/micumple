<!DOCTYPE html>
<html lang="es-AR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabella Cumple</title>

    <!-- Bootstrap’s CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- CSS style -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <!-- El anuncio que dice que estas invitado/a a: "Mi cumple", "Mi Fiesta", "La kermes", "Mi Spa Cumple", etc -->
        <h1>¡estás invitado/a a la:</h1>
        <h2>kermés</h2>
        <hr>
    </header>

    <!-- Informacion del cumpleañero/a -->
    <section class="info-cumple">
        <!--
         Cumpleaños número
         8
         +de+
         ISI
         banner
        -->
        <h1>cumpleaños número</h1>
        <span class="number">8</span>
        <h2>de</h2>
        <p class="user-name">isi ruiz</p>

    </section>
    <div class="spacer"></div>
    <!-- Aquí va la información del horario, fecha y dirección del lugar -->
    <section class="info-event">
        <!-- Fecha -->
        <div class="mini-card fecha">
            <i class="bi bi-calendar2-heart"></i>
            <time datetime="2026-05-03">
                03 de mayo
            </time>
        </div>
        <!-- Horario: desde><hasta -->
        <div class="mini-card horario">
            <i class="bi bi-alarm"></i>
            <div>
                De <time datetime="15:00">15:00</time>
                a <time datetime="18:00">18:00</time> hs
            </div>
        </div>
        <!-- dirección + google maps link -->
        <div class="mini-card maps">
            <i class="bi bi-geo-alt"></i>
            <span>club roma</span>
        </div>

    </section>

    <nav>
        <!-- <button class="btn btn-warning rounded-circle btn-trigger"><i class="bi bi-stars"></i></button> -->
        <button id="qr" class="btn-trigger"><i class="bi bi-qr-code"></i></button>
        <button id="send" class="btn-trigger"><i class="bi bi-gift-fill"></i></button>
        <button id="share" class="btn-trigger"><i class="bi bi-share-fill"></i></button>
    </nav>

    <!-- Bootstrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <!-- Confetti Script -->
    <script src="js/confetti.js"></script>
</body>

</html>
